<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify Partners Extractor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
.progress-log .phase { color: #60a5fa; }
.progress-log .highlight { color: #fff; }
.progress-log .done { color: #34d399; }
.progress-log .error { color: #f87171; }
</style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen p-4 md:p-8">
<div class="max-w-3xl mx-auto">

  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <img src="/static/partnersshopify.svg" alt="Shopify Partners" class="h-7">
    <div>
      <h1 class="text-xl font-semibold text-zinc-900">Shopify Partners Extractor</h1>
      <p class="text-sm text-zinc-500">Scrape the Shopify Partners Directory and export to Excel.</p>
    </div>
  </div>

  <!-- Selection & filters -->
  <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6 mb-4" id="step-select">
    <div class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-4">1. Choose filters</div>

    <!-- Locations -->
    <div class="border border-zinc-100 rounded-lg p-4 mb-3">
      <div class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-3">
        Locations
        <span class="text-xs font-normal normal-case text-zinc-400 ml-1.5" id="loc-count">none selected</span>
      </div>
      <div class="grid grid-cols-[repeat(auto-fill,minmax(170px,1fr))] gap-x-4 gap-y-0.5 max-h-56 overflow-y-auto" id="country-checkboxes"></div>
      <div class="flex gap-2 mt-3">
        <button class="text-xs font-medium text-zinc-600 bg-zinc-100 hover:bg-zinc-200 rounded-md px-3 py-1.5 transition-colors" onclick="selectAllCountries(true)">Select All</button>
        <button class="text-xs font-medium text-zinc-600 bg-zinc-100 hover:bg-zinc-200 rounded-md px-3 py-1.5 transition-colors" onclick="selectAllCountries(false)">Clear All</button>
      </div>
    </div>

    <!-- Industry -->
    <div class="border border-zinc-100 rounded-lg p-4 mb-3">
      <div class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Industry</div>
      <select id="industry-select" class="w-full rounded-lg border border-zinc-200 bg-white px-3 py-2 text-sm text-zinc-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></select>
    </div>

    <!-- Partner Tier -->
    <div class="border border-zinc-100 rounded-lg p-4 mb-3">
      <div class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Partner Tier</div>
      <div class="flex flex-wrap gap-x-6 gap-y-1" id="tier-checkboxes"></div>
    </div>

    <!-- Language -->
    <div class="border border-zinc-100 rounded-lg p-4 mb-4">
      <div class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Language</div>
      <select id="language-select" class="w-full rounded-lg border border-zinc-200 bg-white px-3 py-2 text-sm text-zinc-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></select>
    </div>

    <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-5 py-2.5 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" id="btn-check" onclick="checkCount()">
      Check Count
    </button>

    <div id="count-result" class="hidden mt-4"></div>
    <div id="confirm-area" class="hidden mt-4"></div>
  </div>

  <!-- Progress -->
  <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6 mb-4 hidden" id="step-progress">
    <div class="flex items-center justify-between mb-4">
      <span class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">2. Scraping progress</span>
      <span class="text-xs font-medium bg-amber-50 text-amber-700 rounded-md px-2 py-0.5">&le; 30 req/min</span>
    </div>
    <div class="bg-zinc-200 rounded-full h-2 overflow-hidden">
      <div class="h-full bg-blue-600 rounded-full transition-all duration-300" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="bg-zinc-900 text-emerald-400 rounded-lg p-4 font-mono text-sm leading-relaxed mt-4 max-h-80 overflow-y-auto whitespace-pre-wrap break-all" id="progress-log"></div>
  </div>

  <!-- Download -->
  <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6 mb-4 hidden" id="step-download">
    <div class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-4">3. Complete</div>
    <p class="text-sm text-zinc-700 mb-4" id="download-msg">Scraping finished successfully!</p>
    <div class="flex gap-3">
      <button class="rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-5 py-2.5 transition-colors" id="btn-download" onclick="downloadExcel()">Download Excel</button>
      <button class="rounded-lg bg-zinc-100 hover:bg-zinc-200 text-zinc-900 font-medium text-sm px-5 py-2.5 transition-colors" onclick="resetAll()">Start New Scrape</button>
    </div>
  </div>

</div>

<script>
// ---------- Data from server ----------
const COUNTRIES = {{ countries|tojson }};
const INDUSTRIES = {{ industries|tojson }};
const LANGUAGES = {{ languages|tojson }};

// Build industry dropdown
const indSel = document.getElementById("industry-select");
for (const [k, v] of Object.entries(INDUSTRIES)) {
  const opt = document.createElement("option"); opt.value = k; opt.textContent = v.name; indSel.appendChild(opt);
}

// Build language dropdown
const langSel = document.getElementById("language-select");
for (const [k, v] of Object.entries(LANGUAGES)) {
  const opt = document.createElement("option"); opt.value = k; opt.textContent = v.name; langSel.appendChild(opt);
}

// Build tier checkboxes
const tierContainer = document.getElementById("tier-checkboxes");
const TIERS = {"tier_plus":"Plus Partners","tier_premier":"Premier Partners","tier_platinum":"Platinum Partners"};
for (const [val, label] of Object.entries(TIERS)) {
  const lbl = document.createElement("label");
  lbl.className = "inline-flex items-center gap-1.5 text-sm text-zinc-700 cursor-pointer";
  lbl.innerHTML = '<input type="checkbox" value="' + val + '" class="rounded border-zinc-300 text-blue-600 focus:ring-blue-500"> ' + label;
  tierContainer.appendChild(lbl);
}

// Build country checkboxes (sorted)
const sorted = Object.entries(COUNTRIES).sort((a, b) => a[1].name.localeCompare(b[1].name));
const ccContainer = document.getElementById("country-checkboxes");
const countryNames = {};
for (const [code, info] of sorted) {
  countryNames[code] = info.name;
  const lbl = document.createElement("label");
  lbl.className = "inline-flex items-center gap-1.5 text-sm text-zinc-700 cursor-pointer py-0.5";
  lbl.innerHTML = '<input type="checkbox" value="' + code + '" onchange="updateLocCount()" class="rounded border-zinc-300 text-blue-600 focus:ring-blue-500"> ' + info.name;
  ccContainer.appendChild(lbl);
}

function updateLocCount() {
  const n = document.querySelectorAll("#country-checkboxes input:checked").length;
  document.getElementById("loc-count").textContent = n === 0 ? "none selected" : n === 1 ? "1 selected" : n + " selected";
}

function selectAllCountries(v) {
  document.querySelectorAll("#country-checkboxes input[type=checkbox]").forEach(c => c.checked = v);
  updateLocCount();
}

// ---------- State ----------
let scrapedData = [];

function getFilters() {
  const countries = [], tiers = [];
  document.querySelectorAll("#country-checkboxes input:checked").forEach(c => countries.push(c.value));
  document.querySelectorAll("#tier-checkboxes input:checked").forEach(c => tiers.push(c.value));
  return { countries, industry: document.getElementById("industry-select").value, partnerTiers: tiers, language: document.getElementById("language-select").value };
}

// ---------- Check Count ----------
async function checkCount() {
  const filters = getFilters();
  const resEl = document.getElementById("count-result"), confirmEl = document.getElementById("confirm-area");
  const btn = document.getElementById("btn-check");
  btn.disabled = true; btn.innerHTML = '<span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Checking...';
  resEl.classList.add("hidden"); confirmEl.classList.add("hidden");
  try {
    const resp = await fetch("/api/check-count", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(filters) });
    const data = await resp.json();
    if (!resp.ok) {
      resEl.className = "bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mt-4"; resEl.innerHTML = '<strong>Error:</strong> ' + (data.error||"Request failed."); resEl.classList.remove("hidden");
      return;
    }
    const locCount = filters.countries.length;
    const locLabel = locCount === 0 ? "All Countries" : locCount <= 3 ? filters.countries.map(c=>countryNames[c]).join(", ") : locCount + " countries";
    resEl.className = "bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm rounded-lg px-4 py-3 mt-4";
    resEl.innerHTML = 'Found <strong>' + data.total.toLocaleString() + '</strong> partners in <strong>' + locLabel + '</strong> (est. <strong>~' + data.estimated_pages + '</strong> pages).';
    resEl.classList.remove("hidden");
    confirmEl.innerHTML =
      '<div class="flex items-center gap-2 flex-wrap mt-4 mb-3">' +
        '<label class="text-sm text-zinc-600">Scrape at most:</label>' +
        '<input id="limit-input" type="number" min="1" max="' + data.total + '" placeholder="all ' + data.total + '" class="w-24 rounded-lg border border-zinc-200 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">' +
        '<span class="text-xs text-zinc-400">partners (leave blank for all)</span>' +
      '</div>' +
      '<div class="flex gap-3">' +
        '<button class="rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-5 py-2.5 transition-colors" onclick="startScrape()">Start Scraping</button>' +
        '<button class="rounded-lg bg-zinc-100 hover:bg-zinc-200 text-zinc-900 font-medium text-sm px-5 py-2.5 transition-colors" onclick="clearCount()">Cancel</button>' +
      '</div>';
    confirmEl.classList.remove("hidden");
  } catch(err) {
    resEl.className = "bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mt-4"; resEl.innerHTML = '<strong>Error:</strong> ' + err.message; resEl.classList.remove("hidden");
  } finally {
    btn.disabled = false; btn.textContent = "Check Count";
  }
}

function clearCount() {
  document.getElementById("count-result").classList.add("hidden");
  document.getElementById("confirm-area").classList.add("hidden");
}

// ---------- Start Scrape ----------
async function startScrape() {
  const filters = getFilters();
  const lim = document.getElementById("limit-input");
  const limit = lim && lim.value ? parseInt(lim.value, 10) : null;

  scrapedData = [];

  document.getElementById("step-select").classList.add("hidden");
  document.getElementById("step-progress").classList.remove("hidden");
  document.getElementById("step-download").classList.add("hidden");
  document.getElementById("progress-log").textContent = "";
  document.getElementById("progress-bar").style.width = "0%";

  appendLog("phase", "=== Phase 1: Collecting partner links ===");

  try {
    const allPartners = await collectAllLinks(filters, limit);
    if (!allPartners.length) {
      appendLog("error", "\nNo partners found.");
      return;
    }

    const finalLimit = limit && limit > 0 ? Math.min(limit, allPartners.length) : allPartners.length;
    const toScrape = allPartners.slice(0, finalLimit);
    appendLog("highlight", "\nCollected " + allPartners.length + " partner links, scraping " + toScrape.length + ".");

    appendLog("phase", "=== Phase 2: Scraping partner details ===");

    const batchSize = 8;
    const total = toScrape.length;
    let completed = 0;

    for (let i = 0; i < total; i += batchSize) {
      const batch = toScrape.slice(i, i + batchSize);
      const resp = await fetch("/api/scrape-batch", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ partners: batch })
      });
      if (!resp.ok) {
        let msg = "Batch request failed (" + resp.status + ")";
        try { const j = await resp.json(); if (j.error) msg = j.error; } catch(e) {}
        appendLog("error", "\nERROR: " + msg);
        return;
      }
      const data = await resp.json();
      for (const row of data.results) {
        scrapedData.push(row);
        completed++;
      }
      const pct = Math.round(completed / total * 100);
      document.getElementById("progress-bar").style.width = pct + "%";
      const last = data.results[data.results.length - 1];
      updateLastLog("[" + completed + "/" + total + "] " + (last ? last.name : ""));
    }

    appendLog("done", "\nScraping complete!");
    document.getElementById("step-progress").classList.add("hidden");
    document.getElementById("step-download").classList.remove("hidden");
    document.getElementById("download-msg").textContent = "Scraped " + total + " partners successfully.";

  } catch (err) {
    appendLog("error", "\nERROR: " + err.message);
  }
}

async function collectAllLinks(filters, limit) {
  const allPartners = [];
  let page = 1;
  let hasMore = true;

  while (hasMore) {
    const body = { ...filters, page };
    const resp = await fetch("/api/collect-links", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!resp.ok) {
      let msg = "Collect request failed (" + resp.status + ")";
      try { const j = await resp.json(); if (j.error) msg = j.error; } catch(e) {}
      appendLog("error", "\nERROR: " + msg);
      return [];
    }
    const data = await resp.json();
    if (data.type === "error") {
      appendLog("error", "\nERROR: " + data.message);
      return [];
    }

    const partners = data.partners || [];
    allPartners.push(...partners);
    updateLastLog("Page " + data.page + ": " + data.found + " found (total: " + allPartners.length + ")");

    if (allPartners.length === 0) {
      hasMore = false;
    } else if (limit && limit > 0 && allPartners.length >= limit) {
      hasMore = false;
    } else if (partners.length === 0) {
      hasMore = false;
    } else if (data.total_count && allPartners.length >= data.total_count) {
      hasMore = false;
    }

    page++;
    await sleep(400);
  }

  return allPartners;
}

// ---------- Download / Reset ----------
function downloadExcel() {
  if (!scrapedData.length) return;

  const wsData = [["Name", "Website", "Email", "Phone", "Location", "Profile URL"]];
  for (const row of scrapedData) {
    wsData.push([row.name, row.website, row.email, row.phone, row.location, row.profile_url]);
  }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  XLSX.utils.book_append_sheet(wb, ws, "Partners");
  XLSX.writeFile(wb, "shopify_partners.xlsx");
}

function resetAll() {
  scrapedData = [];
  document.getElementById("step-download").classList.add("hidden");
  document.getElementById("step-select").classList.remove("hidden");
  clearCount();
}

// ---------- Helpers ----------
function appendLog(cls, txt) {
  const log = document.getElementById("progress-log");
  log.innerHTML += (cls ? '<span class="' + cls + '">' : '') + esc(txt) + (cls ? '</span>' : '') + '\n';
  log.scrollTop = log.scrollHeight;
}
function updateLastLog(txt) {
  const log = document.getElementById("progress-log");
  const l = log.innerHTML.split("\n");
  if (l.length) l[l.length-1] = esc(txt);
  log.innerHTML = l.join("\n"); log.scrollTop = log.scrollHeight;
}
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
