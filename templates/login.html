<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify Partners Extractor — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white rounded-xl border border-zinc-200 shadow-sm p-8 text-center">
    <img src="/static/partnersshopify.svg" alt="Shopify Partners" class="h-7 mx-auto mb-6">

    <h1 class="text-lg font-semibold text-zinc-900 mb-1">Shopify Partners Extractor</h1>
    <p class="text-sm text-zinc-500 mb-6">Enter the password to continue</p>

    {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-2.5 mb-5">
        {{ error }}
      </div>
    {% endif %}

    <form method="POST" class="space-y-4">
      <input type="password" name="password" placeholder="Password" autofocus
             class="w-full rounded-lg border border-zinc-200 bg-white px-3 py-2.5 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center">
      <button type="submit"
              class="w-full rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm py-2.5 transition-colors">
        Enter
      </button>
    </form>
  </div>
</body>
</html>
